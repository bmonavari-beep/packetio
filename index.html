  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ui-sans-serif, system-ui, sans-serif;\n    --mono: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;\n  }\n  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n  html { scroll-behavior: smooth; }\n  body {\n    font-family: var(--body);\n    background: var(--paper);\n    color: var(--ink);\n    line-height: 1.55;\n    -webkit-font-smoothing: antialiased;\n    overflow-x: hidden;\n  }\n  body::before {\n    content: \"\";\n    position: fixed;\n    inset: 0;\n    pointer-events: none;\n    background-image: linear-gradient(var(--rule) 1px, transparent 1px), linear-gradient(90deg, var(--rule) 1px, transparent 1px);\n    background-size: 72px 72px;\n    opacity: .26;\n    mask-image: linear-gradient(#000, transparent 52rem);\n    -webkit-mask-image: linear-gradient(#000, transparent 52rem);\n    z-index: 0;\n  }\n  a { color: inherit; text-decoration: none; }\n  p { color: var(--muted); }\n  h1, h2, h3, h4 { letter-spacing: -.03em; line-height: 1.08; color: var(--ink); }\n<\u002Fstyle>\n\n<\u002Fhelmet>\n\n<!-- NAV -->\n<nav style=\"position:sticky;top:0;z-index:20;background:rgba(251,251,249,.88);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--rule)\">\n  <div style=\"width:min(1160px,calc(100% - 48px));margin:0 auto;height:68px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1\">\n    <a href=\"#\" style=\"display:flex;align-items:center;gap:10px;font-weight:750;letter-spacing:-.025em;font-size:18px;color:var(--ink)\">\n      <img src=\"fe64793b-4999-4ab0-95fd-8db42f43f3ef\" style=\"width:28px;height:28px;border-radius:7px\" alt=\"Packet.io\">\n      Packet.io\n    <\u002Fa>\n    <div style=\"display:flex;align-items:center;gap:24px;font-size:14px;color:var(--muted);font-weight:550\">\n      <a href=\"#product\" style=\"color:var(--muted);transition:color .15s\" onmouseover=\"this.style.color='var(--ink)'\" onmouseout=\"this.style.color='var(--muted)'\">Product<\u002Fa>\n      <a href=\"#how-it-works\" style=\"color:var(--muted);transition:color .15s\" onmouseover=\"this.style.color='var(--ink)'\" onmouseout=\"this.style.color='var(--muted)'\">How it works<\u002Fa>\n      <a href=\"#features\" style=\"color:var(--muted);transition:color .15s\" onmouseover=\"this.style.color='var(--ink)'\" onmouseout=\"this.style.color='var(--muted)'\">Features<\u002Fa>\n      <a href=\"mailto:hello@packet.io\" style=\"display:inline-flex;align-items:center;gap:7px;min-height:38px;padding:0 16px;border-radius:999px;font-weight:650;font-size:13.5px;border:1px solid var(--rule);background:rgba(255,255,255,.8);color:var(--ink);transition:border-color .15s,background .15s\" onmouseover=\"this.style.borderColor='var(--ink)';this.style.background='#fff'\" onmouseout=\"this.style.borderColor='var(--rule)';this.style.background='rgba(255,255,255,.8)'\">Let's talk<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- HERO -->\n<header style=\"padding:60px 0 60px;position:relative;z-index:1\">\n  <div style=\"width:min(1160px,calc(100% - 48px));margin:0 auto;display:grid;grid-template-columns:minmax(0,1fr) minmax(0,580px);gap:54px;align-items:center\">\n    <div>\n      <div style=\"display:inline-flex;align-items:center;gap:8px;padding:5px 12px 5px 8px;border-radius:999px;border:1px solid var(--rule);background:#fff;font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-bottom:18px;letter-spacing:.01em\">\n        <span style=\"display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--signal)\"><\u002Fspan>\n        Fleet management for the industrial edge\n      <\u002Fdiv>\n      <h1 style=\"font-size:clamp(34px,4.2vw,54px);font-weight:780;line-height:1.06;letter-spacing:-.04em;max-width:13ch\">\n        Every edge deployment is complex.\n        <span style=\"color:var(--muted);font-weight:640\">Managing a fleet of them is a different problem entirely.<\u002Fspan>\n      <\u002Fh1>\n      <p style=\"font-size:17px;max-width:50ch;margin-top:18px;line-height:1.55;color:var(--muted)\">Packet.io gives multi-site operators a central asset model and a single plane to deploy and manage analytics across every edge node.<\u002Fp>\n      <div style=\"display:flex;gap:10px;flex-wrap:wrap;margin-top:32px;align-items:center\">\n        <a href=\"mailto:hello@packet.io\" style=\"display:inline-flex;align-items:center;gap:8px;min-height:46px;padding:0 22px;border-radius:999px;font-weight:660;font-size:14.5px;border:1px solid var(--ink);background:var(--ink);color:#fff;box-shadow:0 8px 22px rgba(14,17,22,.14);transition:transform .15s,box-shadow .15s\" onmouseover=\"this.style.transform='translateY(-1px)';this.style.boxShadow='0 12px 28px rgba(14,17,22,.2)'\" onmouseout=\"this.style.transform='';this.style.boxShadow='0 8px 22px rgba(14,17,22,.14)'\">Let's talk\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><path d=\"M3 7h8M7.5 4l3.5 3-3.5 3\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n        <a href=\"#how-it-works\" style=\"display:inline-flex;align-items:center;gap:7px;min-height:46px;padding:0 20px;border-radius:999px;font-weight:550;font-size:14px;border:1px solid var(--rule);background:transparent;color:var(--muted);transition:border-color .15s,color .15s\" onmouseover=\"this.style.borderColor='var(--ink)';this.style.color='var(--ink)'\" onmouseout=\"this.style.borderColor='var(--rule)';this.style.color='var(--muted)'\">See how it works<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:16px;margin-top:22px;flex-wrap:wrap\">\n        <span style=\"display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11.5px;color:var(--muted)\"><span style=\"width:4px;height:4px;border-radius:50%;background:var(--muted);display:inline-block\"><\u002Fspan>AI-assisted asset modelling<\u002Fspan>\n        <span style=\"display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11.5px;color:var(--muted)\"><span style=\"width:4px;height:4px;border-radius:50%;background:var(--muted);display:inline-block\"><\u002Fspan>Local execution<\u002Fspan>\n        <span style=\"display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11.5px;color:var(--muted)\"><span style=\"width:4px;height:4px;border-radius:50%;background:var(--muted);display:inline-block\"><\u002Fspan>No vendor displacement<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <figure style=\"border:1px solid var(--rule);border-radius:22px;background:#fff;box-shadow:var(--shadow);overflow:hidden;transform:translateX(8px) translateY(-4px)\">\n      <img src=\"a3911163-362a-4678-845d-3743398e2125\" style=\"display:block;width:100%;height:auto\" alt=\"Packet.io AI-assisted tag inference dashboard\" loading=\"eager\" decoding=\"async\">\n    <\u002Ffigure>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ICP / INDUSTRY STRIP -->\n<div style=\"border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);background:#fff;position:relative;z-index:1\">\n  <div style=\"width:min(1160px,calc(100% - 48px));margin:0 auto;padding:18px 0;display:flex;align-items:center;gap:10px;flex-wrap:wrap\">\n    <span style=\"font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-right:6px;white-space:nowrap\">Built for<\u002Fspan>\n    <span style=\"padding:4px 12px;border:1px solid var(--rule);border-radius:999px;font-size:13px;color:var(--muted)\">Renewables &amp; Battery Storage<\u002Fspan>\n    <span style=\"padding:4px 12px;border:1px solid var(--rule);border-radius:999px;font-size:13px;color:var(--muted)\">Grid infrastructure<\u002Fspan>\n    <span style=\"padding:4px 12px;border:1px solid var(--rule);border-radius:999px;font-size:13px;color:var(--muted)\">Manufacturing<\u002Fspan>\n    \n    <span style=\"padding:4px 12px;border:1px solid var(--rule);border-radius:999px;font-size:13px;color:var(--muted)\">&amp; Other Multi-site operators<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- PROBLEM -->\n<section id=\"product\" style=\"padding:88px 0;border-top:none;position:relative;z-index:1\">\n  <div style=\"width:min(1160px,calc(100% - 48px));margin:0 auto\">\n    <div style=\"display:grid;grid-template-columns:minmax(0,420px) minmax(0,1fr);gap:46px;align-items:start;margin-bottom:40px\">\n      <div>\n        <div style=\"display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--signal);margin-bottom:18px\">\n          <span style=\"width:22px;height:1px;background:var(--signal);display:block\"><\u002Fspan>\n          Why it's hard\n        <\u002Fdiv>\n        <h2 style=\"font-size:clamp(26px,3.2vw,40px);font-weight:740\">Two problems block every multi-site edge project.<\u002Fh2>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--rule);border-radius:var(--radius);background:#fff;overflow:hidden;box-shadow:0 10px 36px rgba(14,17,22,.04)\">\n      <div style=\"padding:36px;border-right:1px solid var(--rule)\">\n        <div style=\"font-family:var(--mono);font-size:11px;color:var(--signal);letter-spacing:.1em;text-transform:uppercase;margin-bottom:20px\">01 / Data<\u002Fdiv>\n        <h3 style=\"font-size:23px;font-weight:700;margin-bottom:12px\">No shared way to build a data model<\u002Fh3>\n        <p style=\"font-size:15.5px;color:var(--muted);max-width:48ch;line-height:1.6\">Every site exposes raw tags with no shared meaning — one names a value <code style=\"font-family:var(--mono);font-size:12.5px;background:var(--tint);color:var(--deep);padding:2px 6px;border-radius:5px\">INV3_ACPWR_L1<\u002Fcode>, the next <code style=\"font-family:var(--mono);font-size:12.5px;background:var(--tint);color:var(--deep);padding:2px 6px;border-radius:5px\">PCS-02.kW_out<\u002Fcode>. Building a data model that works across sites means starting from scratch each time.<\u002Fp>\n        <div style=\"margin-top:22px;padding-top:22px;border-top:1px solid var(--rule)\">\n          <div style=\"font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.06em\">The result: weeks of integration work, repeated for every new site.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:36px\">\n        <div style=\"font-family:var(--mono);font-size:11px;color:var(--signal);letter-spacing:.1em;text-transform:uppercase;margin-bottom:20px\">02 / Operations<\u002Fdiv>\n        <h3 style=\"font-size:23px;font-weight:700;margin-bottom:12px\">No fleet operations layer<\u002Fh3>\n        <p style=\"font-size:15.5px;color:var(--muted);max-width:48ch;line-height:1.6\">Configuration, software, and certificates are managed one node at a time, with no central record of what runs where and no way to push a change across sites.<\u002Fp>\n        <div style=\"margin-top:22px;padding-top:22px;border-top:1px solid var(--rule)\">\n          <div style=\"font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.06em\">The result: a certificate renewal becomes a project per node, not one fleet action.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- HOW IT WORKS -->\n<section id=\"how-it-works\" style=\"padding:88px 0;border-top:1px solid var(--rule);position:relative;z-index:1\">\n  <div style=\"width:min(1160px,calc(100% - 48px));margin:0 auto\">\n    <div style=\"display:grid;grid-template-columns:minmax(0,420px) minmax(0,1fr);gap:46px;align-items:start;margin-bottom:44px\">\n      <div>\n        <div style=\"display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--signal);margin-bottom:18px\">\n          <span style=\"width:22px;height:1px;background:var(--signal);display:block\"><\u002Fspan>\n          How Packet.io works\n        <\u002Fdiv>\n        <h2 style=\"font-size:clamp(26px,3.2vw,40px);font-weight:740\">Three steps from raw tags to fleet-wide analytics.<\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"font-size:17px;max-width:56ch;color:var(--muted);line-height:1.6;margin-top:4px\">Build the model once, then run every site through it. Modelling is AI-assisted; execution is local and efficient.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--rule);border-radius:var(--radius);background:#fff;overflow:hidden;box-shadow:0 10px 36px rgba(14,17,22,.04)\">\n      <!-- Step 1 -->\n      <div style=\"padding:34px;border-right:1px solid var(--rule);position:relative\">\n        <div style=\"font-family:var(--mono);font-size:11px;color:var(--signal);letter-spacing:.1em;text-transform:uppercase;margin-bottom:18px\">01 / Connect<\u002Fdiv>\n        <h3 style=\"font-size:21px;font-weight:700;letter-spacing:-.025em;margin-bottom:12px\">Read what's already there<\u002Fh3>\n        <p style=\"font-size:15px;color:var(--muted);line-height:1.6\">Read-only ingestion adapters connect to the systems already installed at each site — historians, gateways, OPC-UA servers. Nothing is deployed on site for this step.<\u002Fp>\n        <div style=\"margin-top:24px;padding:12px 14px;border-radius:10px;background:var(--tint);font-family:var(--mono);font-size:12px;color:var(--deep)\">Modbus · OPC-UA · MQTT · REST<\u002Fdiv>\n      <\u002Fdiv>\n      <!-- Step 2 -->\n      <div style=\"padding:34px;border-right:1px solid var(--rule)\">\n        <div style=\"font-family:var(--mono);font-size:11px;color:var(--signal);letter-spacing:.1em;text-transform:uppercase;margin-bottom:18px\">02 / Model<\u002Fdiv>\n        <h3 style=\"font-size:21px;font-weight:700;letter-spacing:-.025em;margin-bottom:12px\">AI names the data, engineers sign off<\u002Fh3>\n        <p style=\"font-size:15px;color:var(--muted);line-height:1.6\">AI proposes a structured meaning for every raw tag — asset class, role, unit, expected range. Engineers confirm or correct. The result is the canonical model: the versioned record every deployment and analytic reads from.<\u002Fp>\n      <\u002Fdiv>\n      <!-- Step 3 -->\n      <div style=\"padding:34px\">\n        <div style=\"font-family:var(--mono);font-size:11px;color:var(--signal);letter-spacing:.1em;text-transform:uppercase;margin-bottom:18px\">03 / Deploy<\u002Fdiv>\n        <h3 style=\"font-size:21px;font-weight:700;letter-spacing:-.025em;margin-bottom:12px\">Deploy to the fleet, run on site<\u002Fh3>\n        <p style=\"font-size:15px;color:var(--muted);line-height:1.6\">Configurations and analytics models are declared against the canonical model and deployed fleet-wide in staged batches. Everything executes on a minimal on-site runtime — in real time, independent of connectivity.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PRODUCT SHOWCASE -->\n<section style=\"padding:88px 0;border-top:1px solid var(--rule);position:relative;z-index:1\">\n  <div style=\"width:min(1160px,calc(100% - 48px));margin:0 auto\">\n    <div style=\"display:grid;grid-template-columns:minmax(0,420px) minmax(0,1fr);gap:46px;align-items:start;margin-bottom:44px\">\n      <div>\n        <div style=\"display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--signal);margin-bottom:18px\">\n          <span style=\"width:22px;height:1px;background:var(--signal);display:block\"><\u002Fspan>\n          The platform\n        <\u002Fdiv>\n        <h2 style=\"font-size:clamp(26px,3.2vw,40px);font-weight:740\">Model the data. Deploy the analytics. Manage the fleet.<\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"font-size:17px;max-width:56ch;color:var(--muted);line-height:1.6;margin-top:4px\">From building a shared data model across sites, to deploying AI analytics as governed artifacts, to operating the edge fleet — in a single plane.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;gap:24px\">\n      <!-- Card 1 -->\n      <div style=\"display:grid;grid-template-columns:320px minmax(0,1fr);border:1px solid var(--rule);border-radius:22px;background:#fff;overflow:hidden;box-shadow:0 18px 50px rgba(14,17,22,.055)\">\n        <div style=\"padding:36px 30px;border-right:1px solid var(--rule);display:flex;flex-direction:column\">\n          <div style=\"font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px\">Pillar 1<\u002Fdiv>\n          <h3 style=\"font-size:26px;font-weight:740;letter-spacing:-.03em;margin-bottom:12px\">AI-assisted asset modelling<\u002Fh3>\n          <p style=\"font-size:15px;color:var(--muted);line-height:1.6;flex:1\">Ingestion adapters read what's already installed at each site — nothing deployed on site. AI proposes a structured meaning for every raw tag: asset class, role, unit, expected range. Engineers confirm or correct in the validation workbench. The result is the canonical model: the versioned, cross-site record of what every tag means, and the foundation everything else in the platform reads from.<\u002Fp>\n          <div style=\"margin-top:24px;display:grid;gap:7px\">\n            <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);font-weight:640\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--signal);flex:none\"><\u002Fspan>Ingestion adapters<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);font-weight:640\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--signal);flex:none\"><\u002Fspan>Tag inference engine<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);font-weight:640\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--signal);flex:none\"><\u002Fspan>Validation workbench<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);font-weight:640\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--signal);flex:none\"><\u002Fspan>Canonical model store<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);font-weight:640\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--signal);flex:none\"><\u002Fspan>Model drift detection<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:22px;background:var(--paper)\">\n          <figure style=\"border:1px solid var(--rule);border-radius:16px;background:#fff;overflow:hidden;box-shadow:0 8px 28px rgba(14,17,22,.07)\">\n            <img src=\"a3911163-362a-4678-845d-3743398e2125\" style=\"display:block;width:100%;height:auto\" alt=\"AI tagging dashboard\" loading=\"lazy\" decoding=\"async\">\n          <\u002Ffigure>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Card 2 -->\n      <div style=\"display:grid;grid-template-columns:320px minmax(0,1fr);border:1px solid var(--rule);border-radius:22px;background:#fff;overflow:hidden;box-shadow:0 18px 50px rgba(14,17,22,.055)\">\n        <div style=\"padding:36px 30px;border-right:1px solid var(--rule);display:flex;flex-direction:column\">\n          <div style=\"font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px\">Pillar 2<\u002Fdiv>\n          <h3 style=\"font-size:26px;font-weight:740;letter-spacing:-.03em;margin-bottom:12px\">Fleet edge management<\u002Fh3>\n          <p style=\"font-size:15px;color:var(--muted);line-height:1.6;flex:1\">Changes are declared against the model and staged in batches — each stage health-checked, with automatic reversal on failure. A minimal on-site runtime executes everything locally in real time. The fleet keeps running when the cloud is unreachable.<\u002Fp>\n          <div style=\"margin-top:24px;display:grid;gap:7px\">\n            <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);font-weight:640\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--signal);flex:none\"><\u002Fspan>Node registry<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);font-weight:640\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--signal);flex:none\"><\u002Fspan>Deployment engine<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);font-weight:640\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--signal);flex:none\"><\u002Fspan>Offline-tolerant delivery<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);font-weight:640\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--signal);flex:none\"><\u002Fspan>Security operations<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);font-weight:640\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--signal);flex:none\"><\u002Fspan>Fleet observability<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:22px;background:var(--paper)\">\n          <figure style=\"border:1px solid var(--rule);border-radius:16px;background:#fff;overflow:hidden;box-shadow:0 8px 28px rgba(14,17,22,.07)\">\n            <img src=\"294adfa9-d333-4418-9bf1-73d3c0fa0195\" style=\"display:block;width:100%;height:auto\" alt=\"Fleet management dashboard\" loading=\"lazy\" decoding=\"async\">\n          <\u002Ffigure>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Card 3 -->\n      <div style=\"display:grid;grid-template-columns:320px minmax(0,1fr);border:1px solid var(--rule);border-radius:22px;background:#fff;overflow:hidden;box-shadow:0 18px 50px rgba(14,17,22,.055)\">\n        <div style=\"padding:36px 30px;border-right:1px solid var(--rule);display:flex;flex-direction:column\">\n          <div style=\"font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px\">Pillar 3<\u002Fdiv>\n          <h3 style=\"font-size:26px;font-weight:740;letter-spacing:-.03em;margin-bottom:12px\">Analytics model deployment<\u002Fh3>\n          <p style=\"font-size:15px;color:var(--muted);line-height:1.6;flex:1\">Analytics models declare their input tag dependencies against the canonical model before deployment — making the relationship between model and data explicit, not discovered after the fact. A gated pipeline runs each new version in shadow before promotion. Input drift monitoring quarantines a running model when its live inputs diverge from what it was built on.<\u002Fp>\n          <div style=\"margin-top:24px;display:grid;gap:7px\">\n            <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);font-weight:640\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--signal);flex:none\"><\u002Fspan>Artifact registry<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);font-weight:640\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--signal);flex:none\"><\u002Fspan>Gated promotion pipeline<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);font-weight:640\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--signal);flex:none\"><\u002Fspan>Input drift monitoring<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink);font-weight:640\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--signal);flex:none\"><\u002Fspan>Fleet artifact inventory<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:20px;background:var(--paper);display:flex;flex-direction:column;gap:10px\">\n          <!-- Model header -->\n          <div style=\"border:1px solid var(--rule);border-radius:14px;background:#fff;padding:16px 18px;box-shadow:0 2px 8px rgba(14,17,22,.04)\">\n            <div style=\"display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px\">\n              <div>\n                <div style=\"font-family:var(--mono);font-size:13px;font-weight:700;color:var(--ink)\">inverter.fault_predictor<\u002Fdiv>\n                <div style=\"font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px\">v1.3 · 128 sites · fleet stage<\u002Fdiv>\n              <\u002Fdiv>\n              <span style=\"display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10.5px;color:#1a7a40;background:#eaf6ee;padding:3px 9px;border-radius:999px;white-space:nowrap;flex:none\">\n                <span style=\"width:5px;height:5px;border-radius:50%;background:#1a7a40;display:inline-block\"><\u002Fspan>live\n              <\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px\">Inputs from data model<\u002Fdiv>\n            <div style=\"display:flex;gap:5px;flex-wrap:wrap\">\n              <span style=\"font-family:var(--mono);font-size:10.5px;color:var(--deep);background:var(--tint);padding:2px 7px;border-radius:4px\">nr/inv-3/ac_power_l1<\u002Fspan>\n              <span style=\"font-family:var(--mono);font-size:10.5px;color:var(--deep);background:var(--tint);padding:2px 7px;border-radius:4px\">nr/inv-3/dc_voltage<\u002Fspan>\n              <span style=\"font-family:var(--mono);font-size:10.5px;color:var(--deep);background:var(--tint);padding:2px 7px;border-radius:4px\">nr/inv-3/temperature<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- Chart -->\n          <div style=\"border:1px solid var(--rule);border-radius:14px;background:#fff;padding:16px 18px;box-shadow:0 2px 8px rgba(14,17,22,.04)\">\n            <div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:10px\">\n              <div style=\"font-size:12px;font-weight:700;color:var(--ink)\">Fault probability — last 24h<\u002Fdiv>\n              <div style=\"font-family:var(--mono);font-size:10.5px;color:var(--muted)\">p50 latency: 38ms<\u002Fdiv>\n            <\u002Fdiv>\n            <svg viewBox=\"0 0 340 68\" style=\"width:100%;display:block;overflow:visible\">\n              <defs>\n                <linearGradient id=\"chartfill\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n                  <stop offset=\"0%\" stop-color=\"rgba(31,95,204,0.14)\"><\u002Fstop>\n                  <stop offset=\"100%\" stop-color=\"rgba(31,95,204,0)\"><\u002Fstop>\n                <\u002FlinearGradient>\n              <\u002Fdefs>\n              <line x1=\"0\" y1=\"42\" x2=\"340\" y2=\"42\" stroke=\"#e6e9ed\" stroke-width=\"1\" stroke-dasharray=\"3 3\"><\u002Fline>\n              <text x=\"2\" y=\"40\" font-size=\"8.5\" fill=\"#9ba3ae\" font-family=\"monospace\">20%<\u002Ftext>\n              <path d=\"M0,64 L0,60 L11,59 L22,61 L33,60 L44,59 L55,61 L66,60 L77,61 L88,60 L99,59 L110,61 L121,60 L132,59 L143,61 L154,60 L165,61 L176,60 L187,59 L198,58 L209,14 L220,22 L231,38 L242,53 L253,59 L264,60 L275,59 L286,61 L297,60 L318,60 L340,61 L340,64 Z\" fill=\"url(#chartfill)\"><\u002Fpath>\n              <polyline points=\"0,60 11,59 22,61 33,60 44,59 55,61 66,60 77,61 88,60 99,59 110,61 121,60 132,59 143,61 154,60 165,61 176,60 187,59 198,58 209,14 220,22 231,38 242,53 253,59 264,60 275,59 286,61 297,60 318,60 340,61\" fill=\"none\" stroke=\"var(--signal)\" stroke-width=\"1.5\" stroke-linejoin=\"round\" stroke-linecap=\"round\"><\u002Fpolyline>\n              <circle cx=\"209\" cy=\"14\" r=\"3\" fill=\"var(--signal)\"><\u002Fcircle>\n              <line x1=\"209\" y1=\"14\" x2=\"209\" y2=\"64\" stroke=\"var(--signal)\" stroke-width=\"1\" stroke-dasharray=\"2 2\" opacity=\".4\"><\u002Fline>\n              <text x=\"195\" y=\"11\" font-size=\"8.5\" fill=\"var(--signal)\" font-family=\"monospace\">44%<\u002Ftext>\n            <\u002Fsvg>\n            <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:0;margin-top:12px;padding-top:12px;border-top:1px solid var(--rule)\">\n              <div style=\"padding-right:12px;border-right:1px solid var(--rule)\">\n                <div style=\"font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:3px\">Accuracy<\u002Fdiv>\n                <div style=\"font-size:15px;font-weight:760;color:var(--ink);letter-spacing:-.02em\">94.2%<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding:0 12px;border-right:1px solid var(--rule)\">\n                <div style=\"font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:3px\">Current<\u002Fdiv>\n                <div style=\"font-size:15px;font-weight:760;color:var(--ink);letter-spacing:-.02em\">0.04<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding:0 12px;border-right:1px solid var(--rule)\">\n                <div style=\"font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:3px\">Input drift<\u002Fdiv>\n                <div style=\"font-size:15px;font-weight:760;color:#1a7a40;letter-spacing:-.02em\">nominal<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding-left:12px\">\n                <div style=\"font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:3px\">Sites<\u002Fdiv>\n                <div style=\"font-size:15px;font-weight:760;color:var(--ink);letter-spacing:-.02em\">128<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- VALUE -->\n<section style=\"padding:88px 0;border-top:1px solid var(--rule);position:relative;z-index:1\">\n  <div style=\"width:min(1160px,calc(100% - 48px));margin:0 auto\">\n    <div style=\"margin-bottom:40px\">\n      <div style=\"display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--signal);margin-bottom:18px\">\n        <span style=\"width:22px;height:1px;background:var(--signal);display:block\"><\u002Fspan>\n        The value\n      <\u002Fdiv>\n      <h2 style=\"font-size:clamp(26px,3.2vw,40px);font-weight:740\">Faster rollout. Lower cost. No lock-in.<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--rule);border-radius:var(--radius);background:#fff;overflow:hidden;box-shadow:0 10px 36px rgba(14,17,22,.04)\">\n      <div style=\"padding:32px;border-right:1px solid var(--rule)\">\n        <div style=\"font-weight:780;font-size:40px;line-height:1;color:var(--signal);letter-spacing:-.05em;margin-bottom:18px\">Zero <span style=\"font-size:14px;color:var(--muted);letter-spacing:0;font-weight:640;margin-left:2px\">displacement<\u002Fspan><\u002Fdiv>\n        <h4 style=\"font-size:18px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px\">No vendor lock-in<\u002Fh4>\n        <p style=\"font-size:14.5px;color:var(--muted);line-height:1.6\">Connects read-only to the equipment and software already installed. Nothing is ripped out or replaced.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:32px;border-right:1px solid var(--rule)\">\n        <div style=\"font-weight:780;font-size:40px;line-height:1;color:var(--signal);letter-spacing:-.05em;margin-bottom:18px\">80%+ <span style=\"font-size:14px;color:var(--muted);letter-spacing:0;font-weight:640;margin-left:2px\">faster<\u002Fspan><\u002Fdiv>\n        <h4 style=\"font-size:18px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px\">Faster fleet rollout<\u002Fh4>\n        <p style=\"font-size:14.5px;color:var(--muted);line-height:1.6\">An analytic declared against the model deploys to every site at once — not rebuilt, re-mapped, and re-tested per site.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:32px\">\n        <div style=\"font-weight:780;font-size:40px;line-height:1;color:var(--signal);letter-spacing:-.05em;margin-bottom:18px\">1 <span style=\"font-size:14px;color:var(--muted);letter-spacing:0;font-weight:640;margin-left:2px\">action<\u002Fspan><\u002Fdiv>\n        <h4 style=\"font-size:18px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px\">Lower maintenance cost<\u002Fh4>\n        <p style=\"font-size:14.5px;color:var(--muted);line-height:1.6\">Certificate renewals, patches, and config changes become one staged fleet campaign instead of a node-by-node project.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FEATURES -->\n<section id=\"features\" style=\"padding:88px 0;border-top:1px solid var(--rule);position:relative;z-index:1\">\n  <div style=\"width:min(1160px,calc(100% - 48px));margin:0 auto\">\n    <div style=\"display:grid;grid-template-columns:minmax(0,420px) minmax(0,1fr);gap:46px;align-items:start;margin-bottom:44px\">\n      <div>\n        <div style=\"display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--signal);margin-bottom:18px\">\n          <span style=\"width:22px;height:1px;background:var(--signal);display:block\"><\u002Fspan>\n          Full feature set\n        <\u002Fdiv>\n        <h2 style=\"font-size:clamp(26px,3.2vw,40px);font-weight:740\">Everything the model makes possible.<\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"font-size:17px;max-width:56ch;color:var(--muted);line-height:1.6;margin-top:4px\">Every layer of the stack, purpose-built and integrated.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border:1px solid var(--rule);border-radius:var(--radius);background:#fff;overflow:hidden;box-shadow:0 10px 36px rgba(14,17,22,.04)\">\n      <div style=\"display:grid;grid-template-columns:240px 1fr;align-items:stretch;border-bottom:1px solid var(--rule)\">\n        <div style=\"padding:22px 24px;border-right:1px solid var(--rule);display:flex;align-items:center;gap:10px\">\n          <span style=\"font-family:var(--mono);font-size:11px;color:var(--signal);font-weight:500;flex:none\">1<\u002Fspan>\n          <span style=\"font-size:14px;font-weight:700;color:var(--ink)\">Model construction<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding:22px 24px\">\n          <p style=\"font-size:14px;color:var(--muted);line-height:1.6\">Ingestion adapters read your existing gateways; the tag inference engine proposes a structured meaning for each raw tag, confidence-scored; engineers confirm via the validation workbench; the result is stored as a versioned, cross-site canonical model with template reuse and automated drift detection.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:240px 1fr;align-items:stretch;border-bottom:1px solid var(--rule)\">\n        <div style=\"padding:22px 24px;border-right:1px solid var(--rule);display:flex;align-items:center;gap:10px\">\n          <span style=\"font-family:var(--mono);font-size:11px;color:var(--signal);font-weight:500;flex:none\">2<\u002Fspan>\n          <span style=\"font-size:14px;font-weight:700;color:var(--ink)\">Fleet operations<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding:22px 24px\">\n          <p style=\"font-size:14px;color:var(--muted);line-height:1.6\">A node registry tracks every edge device across the fleet; the deployment engine stages changes with auto-reversal and offline-tolerant delivery; full change management — author, approve, diff, result — with signed artifacts, write-path controls, and rollback to any prior version.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:240px 1fr;align-items:stretch;border-bottom:1px solid var(--rule)\">\n        <div style=\"padding:22px 24px;border-right:1px solid var(--rule);display:flex;align-items:center;gap:10px\">\n          <span style=\"font-family:var(--mono);font-size:11px;color:var(--signal);font-weight:500;flex:none\">3<\u002Fspan>\n          <span style=\"font-size:14px;font-weight:700;color:var(--ink)\">Analytics model governance<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding:22px 24px\">\n          <p style=\"font-size:14px;color:var(--muted);line-height:1.6\">A versioned artifact registry holds every analytics model with its declared inputs and target runtime; gated promotion requires a shadow run before any version goes live; input drift monitoring quarantines models when live data diverges; a fleet-wide inventory shows which version runs on which assets.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:240px 1fr;align-items:stretch;border-bottom:1px solid var(--rule)\">\n        <div style=\"padding:22px 24px;border-right:1px solid var(--rule);display:flex;align-items:center;gap:10px\">\n          <span style=\"font-family:var(--mono);font-size:11px;color:var(--signal);font-weight:500;flex:none\">4<\u002Fspan>\n          <span style=\"font-size:14px;font-weight:700;color:var(--ink)\">Security operations<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding:22px 24px\">\n          <p style=\"font-size:14px;color:var(--muted);line-height:1.6\">Certificate lifecycle management with expiry tracking and orchestrated renewal; OS and agent patches run as staged fleet campaigns; access control scoped by site, asset class, and risk level; audit evidence generated from records already held in the platform.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:240px 1fr;align-items:stretch\">\n        <div style=\"padding:22px 24px;border-right:1px solid var(--rule);display:flex;align-items:center;gap:10px\">\n          <span style=\"font-family:var(--mono);font-size:11px;color:var(--signal);font-weight:500;flex:none\">5<\u002Fspan>\n          <span style=\"font-size:14px;font-weight:700;color:var(--ink)\">Observability<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding:22px 24px\">\n          <p style=\"font-size:14px;color:var(--muted);line-height:1.6\">A fleet state dashboard surfaces health, conformance, and drift across all sites in one view; per-tag data quality monitoring checks for staleness, flatline, and range violations; fleet-wide queries answer any model question across every connected site.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- END STATE QUOTE -->\n<section style=\"padding:88px 0;border-top:1px solid var(--rule);position:relative;z-index:1\">\n  <div style=\"width:min(1160px,calc(100% - 48px));margin:0 auto\">\n    <div style=\"background:var(--ink);color:#fff;border-radius:22px;padding:52px 56px;box-shadow:var(--shadow);position:relative;overflow:hidden;display:grid;grid-template-columns:1fr auto;gap:40px;align-items:center\">\n      <div style=\"position:absolute;right:-60px;top:-60px;width:240px;height:240px;border:1px solid rgba(255,255,255,.07);border-radius:50%\"><\u002Fdiv>\n      <div style=\"position:absolute;right:60px;bottom:-80px;width:160px;height:160px;border:1px solid rgba(255,255,255,.05);border-radius:50%\"><\u002Fdiv>\n      <div style=\"position:relative;z-index:1\">\n        <div style=\"display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:#8CB2F2;margin-bottom:22px\">\n          <span style=\"width: 22px; height: 1px; background: rgb(140, 178, 242); display: block;\"><\u002Fspan>\n          OUR MISSION<\u002Fdiv>\n        <div s
